---
# Vendor addon: reverse-ssh-tunnel (ssh-rtg) inventory
#
# This inventory defines two groups for the SSH tunnel addon:
#   tunnel_clients  — NAT-side hosts that initiate reverse SSH connections
#   tunnel_servers  — public VPS hosts that accept and route tunnels
#
# Usage:
#   ansible-playbook -i inventories/vendor/tunnels/hosts.yml \
#     playbooks/deploy-tunnels.yml
#
# Quick example — a NAT-side host exposing SSH and a web app through a VPS:
#   tunnel_clients:
#     hosts:
#       rpi-home:
#         ansible_host: 192.168.1.100
#   tunnel_servers:
#     hosts:
#       vps-tunnel:
#         ansible_host: tunnel.example.com
all:
  children:
    tunnel_clients:
      hosts:
        # Replace with your NAT-side host(s)
        # nat-host-01:
        #   ansible_host: 192.168.1.100
      vars:
        ssh_tunnel_jump_host: ""       # REQUIRED — set to "tunnel@your-vps.com"
        ssh_tunnel_ports: []           # List of {local_port, remote_port, description}
        ssh_tunnel_generate_key: true  # Generate Ed25519 key on first run

    tunnel_servers:
      hosts:
        # Replace with your public VPS host(s)
        # vps-tunnel:
        #   ansible_host: tunnel.example.com
      vars:
        ssh_tunnel_ports: []           # MUST match the clients' port list
        ssh_tunnel_firewall_type: ufw
