---
# backup: database dumps + restic remote sync
# Run manually or trigged by deploy.yml pre_tasks.
# Requires: restic installed on host (for remote sync)

- name: Backup databases
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    ts: "{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}"

  tasks:
    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    # ── GitLab ──────────────────────────────────────
    - name: Dump GitLab DB
      community.docker.docker_container_exec:
        container: gitlab
        command: gitlab-backup create
      when: gitlab_enable | default(true)
      ignore_errors: yes
      register: gitlab_backup
      tags: [db-gitlab]

    - name: Copy GitLab backup
      shell:
        cmd: |
          set -o pipefail
          latest=$(docker exec gitlab ls -t /var/opt/gitlab/backups/*.tar 2>/dev/null | head -1)
          [ -n "$latest" ] && docker cp "gitlab:$latest" \
            "{{ backup_dir }}/gitlab-{{ ts }}.tar"
        executable: /bin/bash
      changed_when: true
      when:
        - gitlab_enable | default(true)
        - gitlab_backup is succeeded
      tags: [db-gitlab]

    # ── Supabase ────────────────────────────────────
    - name: Dump Supabase DB
      community.docker.docker_container_exec:
        container: supabase-db
        command: pg_dump -U postgres --clean --if-exists -d postgres -f /tmp/supabase-dump.sql
      when: supabase_enable | default(true)
      ignore_errors: yes
      register: supabase_dump
      tags: [db-supabase]

    - name: Copy Supabase dump
      command:
        cmd: docker cp supabase-db:/tmp/supabase-dump.sql "{{ backup_dir }}/supabase-{{ ts }}.sql"
      changed_when: true
      when:
        - supabase_enable | default(true)
        - supabase_dump is succeeded
      tags: [db-supabase]

    # ── Matrix ──────────────────────────────────────
    - name: Dump Matrix Synapse DB
      community.docker.docker_container_exec:
        container: matrix-db
        command: pg_dump -U synapse --clean --if-exists -d synapse -f /tmp/synapse-dump.sql
      when: matrix_enable | default(true)
      ignore_errors: yes
      register: matrix_dump
      tags: [db-matrix]

    - name: Copy Matrix dump
      command:
        cmd: docker cp matrix-db:/tmp/synapse-dump.sql "{{ backup_dir }}/synapse-{{ ts }}.sql"
      changed_when: true
      when:
        - matrix_enable | default(true)
        - matrix_dump is succeeded
      tags: [db-matrix]

    # ── Rotate old backups ──────────────────────────
    - name: Remove backups older than retention days
      find:
        paths: "{{ backup_dir }}"
        patterns: "*.sql,*.dump,*.tar"
        age: "{{ backup_retention_days }}d"
      register: old_backups
      tags: [cleanup]

    - name: Delete old backup files
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files }}"
      when: old_backups.files | length > 0
      tags: [cleanup]

    # ── Restic remote sync ──────────────────────────
    - name: Sync backup dir to remote (restic)
      command:
        cmd: "restic backup {{ backup_dir }} --tag homelab --tag {{ ts }}"
      changed_when: true
      when:
        - backup_remote_enable | default(false)
        - restic_repository is defined
        - vault_restic_password is defined
      environment:
        RESTIC_REPOSITORY: "{{ restic_repository }}"
        RESTIC_PASSWORD: "{{ vault_restic_password }}"
      tags: [remote]

    - name: Forget old restic snapshots (retain 30 daily, 12 monthly)
      command:
        cmd: restic forget --keep-daily 30 --keep-monthly 12 --prune
      changed_when: true
      when:
        - backup_remote_enable | default(false)
        - restic_repository is defined
        - vault_restic_password is defined
      environment:
        RESTIC_REPOSITORY: "{{ restic_repository }}"
        RESTIC_PASSWORD: "{{ vault_restic_password }}"
      tags: [remote]
