---
# rotate-secrets: regenerate ansible-vault + service passwords
# Usage: ansible-playbook rotate-secrets.yml
# WARNING: Rotates secrets in vault.yml. Services will restart.
# After rotation, run ansible-vault re-key vault.yml with the new password.

- name: Rotate secrets
  hosts: all
  become: yes
  gather_facts: no

  vars_prompt:
    - name: confirm
      prompt: "This will regenerate secrets and restart services. Continue? (yes/no)"
      private: no

  tasks:
    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Rotation cancelled."
      when: confirm != "yes"

    - name: Generate new postgres passwords
      ansible.builtin.set_fact:
        new_supabase_postgres_password: "{{ lookup('password', '/dev/null chars=32') }}"
        new_supabase_jwt_secret: "{{ lookup('password', '/dev/null chars=64') }}"
        new_authentik_secret_key: "{{ lookup('password', '/dev/null chars=64') }}"
        new_authentik_postgres_password: "{{ lookup('password', '/dev/null chars=32') }}"
        new_searxng_secret_key: "{{ lookup('password', '/dev/null chars=64') }}"

    - name: Show new passwords (operator must copy to vault.yml)
      ansible.builtin.debug:
        msg: |
          COPY THESE TO group_vars/all/vault.yml AND RE-ENCRYPT:

          vault_supabase_postgres_password: {{ new_supabase_postgres_password }}
          vault_supabase_jwt_secret: {{ new_supabase_jwt_secret }}
          vault_authentik_secret_key: {{ new_authentik_secret_key }}
          vault_authentik_postgres_password: {{ new_authentik_postgres_password }}
          vault_searxng_secret_key: {{ new_searxng_secret_key }}

    - name: Warn about next steps
      ansible.builtin.debug:
        msg: |
          1. Copy the passwords above into group_vars/all/vault.yml
          2. Run: ansible-vault encrypt group_vars/all/vault.yml
          3. Run: ansible-playbook deploy.yml (restarts all services with new secrets)
