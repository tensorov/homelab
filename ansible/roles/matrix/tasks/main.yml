---
# matrix: Matrix (Synapse + Element + Bridges)

- name: Create Matrix directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/services/matrix/data/synapse
    - /opt/services/matrix/data/postgres
    - /opt/services/matrix/data/element
    - /opt/services/matrix/data/mautrix
    - /opt/services/matrix/data/bridge-signal
    - /opt/services/matrix/data/bridge-whatsapp
    - /opt/services/matrix/data/bridge-telegram
    - /opt/services/matrix/data/sliding-sync

- name: Generate Synapse config
  community.docker.docker_container:
    name: matrix-gen
    image: matrixdotorg/synapse:latest
    state: started
    detach: false
    cleanup: true
    command:
      - python
      - -c
      - |
        import subprocess, sys, os
        subprocess.run([
          "python", "-m", "synapse.app.homeserver",
          "--server-name", "{{ matrix_homeserver_name | default('matrix.' + domain) }}",
          "--config-path", "/data/homeserver.yaml",
          "--generate-config",
          "--report-stats", "{{ matrix_report_stats | default('no') }}"
        ], env={
          "SYNAPSE_SERVER_NAME": "{{ matrix_homeserver_name | default('matrix.' + domain) }}",
          "SYNAPSE_REPORT_STATS": "{{ matrix_report_stats | default('no') }}"
        })
    volumes:
      - /opt/services/matrix/data/synapse:/data
  register: matrix_synapse_gen
  changed_when: synapse_gen is changed
  when: matrix_generate_config | default(false)

- name: Deploy Synapse homeserver.yaml
  template:
    src: homeserver.yaml.j2
    dest: /opt/services/matrix/data/synapse/homeserver.yaml
    mode: '0644'
  notify: restart matrix

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: /opt/services/matrix/docker-compose.yml
    mode: '0644'
  notify: restart matrix

- name: Deploy Element config
  template:
    src: element-config.json.j2
    dest: /opt/services/matrix/data/element/config.json
    mode: '0644'
  notify: restart matrix
  when: matrix_element_enable | default(true)

- name: Deploy nginx upstream
  template:
    src: upstream.conf.j2
    dest: /opt/services/matrix/upstream.conf
    mode: '0644'

- name: Start Matrix stack
  community.docker.docker_compose_v2:
    project_src: /opt/services/matrix
    state: present
  register: matrix_output

- name: Register Synapse admin user
  community.docker.docker_container:
    name: matrix-register
    image: matrixdotorg/synapse:latest
    state: started
    detach: false
    cleanup: true
    command:
      - register_new_matrix_user
      - -u
      - "{{ matrix_admin_user | default('admin') }}"
      - -p
      - "{{ vault_matrix_admin_password }}"
      - -a
      - --config
      - /data/homeserver.yaml
      - http://localhost:8008
    volumes:
      - /opt/services/matrix/data/synapse:/data
  register: matrix_register
  changed_when: matrix_register is changed
  when: matrix_register_admin | default(false)
