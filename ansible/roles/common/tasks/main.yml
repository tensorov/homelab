---
# common: base infrastructure layer
# Docker, Docker Compose, traefik network

- name: Install system dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - python3-pip
      - python3-venv
      - openssl
    state: present
    update_cache: yes
  become: yes

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  become: yes

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  become: yes

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
    state: present
    update_cache: yes
  become: yes
  notify: restart docker

- name: Install Docker Compose plugin
  apt:
    name: docker-compose-plugin
    state: present
  become: yes

- name: Install Python Docker SDK
  pip:
    name:
      - docker
      - jsondiff
    state: present
  become: yes

- name: Ensure Docker is running
  service:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Create traefik Docker network
  community.docker.docker_network:
    name: traefik
    driver: bridge
    state: present
