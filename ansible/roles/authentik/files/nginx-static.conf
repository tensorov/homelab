# Authentik nginx static file config — managed by Ansible
# Serves static assets for Authentik's outpost proxy

location /static/ {
    alias /web/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location /media/ {
    alias /web/media/;
    expires 7d;
    add_header Cache-Control "public";
}
