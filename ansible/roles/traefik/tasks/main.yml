---
# traefik: reverse proxy

- name: Create traefik directories
  file:
    path: "{{ item }}"
    state: directory
    mode: 0755
  loop:
    - /opt/services/traefik
    - /opt/services/traefik/dynamic
    - /opt/services/traefik/letsencrypt
    - /opt/services/traefik/ssl

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: /opt/services/traefik/docker-compose.yml
    mode: 0644
  notify: restart traefik

- name: Deploy traefik static config
  template:
    src: traefik.yml.j2
    dest: /opt/services/traefik/traefik.yml
    mode: 0644
  notify: restart traefik

- name: Deploy dynamic config
  template:
    src: config.yml.j2
    dest: /opt/services/traefik/dynamic/config.yml
    mode: 0644
  notify: restart traefik

- name: Deploy service-specific dynamic configs
  template:
    src: "{{ item }}.j2"
    dest: "/opt/services/traefik/dynamic/{{ item }}"
    mode: 0644
  loop:
    - amadeus-api.yml
    - amadeus-callback.yml
    - copytrading.yml
    - distill-api-redirect.yml
    - distill-app.yml
    - guacamole.yml
    - multica-authentik-callback.yml
    - onlybridge.yml
    - polymarket.yml
    - renderfarm.yml
  notify: restart traefik
  when: deploy_all_services | default(true)

- name: Deploy .env
  template:
    src: env.j2
    dest: /opt/services/traefik/.env
    mode: 0600
  no_log: true
  notify: restart traefik

- name: Start Traefik
  community.docker.docker_compose:
    project_src: /opt/services/traefik
    state: present
    restarted: "{{ traefik_force_restart | default(false) }}"
  register: traefik_output
