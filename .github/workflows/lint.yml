---
name: lint

on:
  push:
    branches: [main]
    paths: ["ansible/**", ".github/workflows/lint.yml", "Makefile", ".pre-commit-config.yaml"]
  pull_request:
    branches: [main]
    paths: ["ansible/**", ".github/workflows/lint.yml", "Makefile", ".pre-commit-config.yaml"]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install 'ansible-core>=2.13,<2.19' ansible-lint yamllint pre-commit
          ansible-galaxy collection install community.docker community.general

      - name: yamllint
        run: yamllint --strict .

      - name: ansible-lint
        run: ansible-lint --config-file .ansible-lint .

      - name: ansible-playbook syntax check
        run: |
          for pb in playbooks/*.yml; do
            echo "=== $pb ==="
            ansible-playbook --syntax-check "$pb"
          done

      - name: pre-commit (ansible-focused)
        run: |
          cd "${{ github.workspace }}"
          pre-commit run --all-files --show-diff-on-failure

      - name: shellcheck
        run: |
          sh_files=$(find ../roles -name '*.sh' 2>/dev/null || true)
          if [ -n "$sh_files" ]; then
            apt-get update -qq && apt-get install -y -qq shellcheck
            shellcheck $sh_files
          else
            echo "No shell scripts found, skipping shellcheck"
          fi

      - name: Validate vault sample
        run: |
          if grep -q '^\$ANSIBLE_VAULT' group_vars/all/vault.yml.sample 2>/dev/null; then
            echo "vault.yml.sample contains real encrypted data!"
            exit 1
          fi
          echo "vault.yml.sample is safe"
